<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>txt — settings</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        width: 300px;
        padding: 16px;
        background: #fff;
        color: #111;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      h1 {
        font-size: 13px;
        font-weight: 600;
      }
      label {
        font-size: 11px;
        color: #666;
        display: block;
        margin-bottom: 4px;
        font-weight: 500;
      }
      input {
        width: 100%;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 12px;
        font-family: inherit;
        outline: none;
      }
      input:focus {
        border-color: #999;
      }
      button {
        border: none;
        border-radius: 4px;
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        background: #111;
        color: #fff;
        width: 100%;
      }
      button:hover {
        background: #333;
      }
      .status {
        font-size: 11px;
        padding: 5px 8px;
        border-radius: 4px;
        display: none;
      }
      .status.success {
        background: #f0fff4;
        color: #060;
        border: 1px solid #9f9;
        display: block;
      }
      .status.error {
        background: #fff0f0;
        color: #c00;
        border: 1px solid #fcc;
        display: block;
      }
      .hint {
        font-size: 11px;
        color: #999;
      }
    </style>
  </head>
  <body>
    <h1>txt settings</h1>
    <div>
      <label>Service URL</label>
      <input
        type="url"
        id="service-url"
        placeholder="https://txt.pmh.so"
      />
    </div>
    <p class="hint">
      Click the extension icon to bookmark the current page. Auth is
      automatic when logged in.
    </p>
    <div id="status" class="status"></div>
    <button id="save-btn">Save</button>
    <script src="popup.js"></script>
  </body>
</html>
